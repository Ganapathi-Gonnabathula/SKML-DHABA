
<html>
    <head>
        <title>SKML</title>
 <style>
           
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#fafaf7;
}

.logo-container{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    width:60px;
    height:60px;
    border-radius:50%;     
    object-fit:cover;
}
.navbar{
background:goldenrod;
height:80px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 60px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.banner{
padding:35px 60px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:80px;         
    margin-top:30px;
    flex-wrap:wrap;    
}


.card{
text-align:center;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.circle{
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
box-shadow:0 5px 12px rgba(0,0,0,.15);
margin:auto;
}

.circle img{
width:100%;
height:100%;
object-fit:cover;
}

.card h3{
margin-top:15px;
font-size:22px;
font-weight:500;
}

.btn{
    color:goldenrod;
    align-items:center;
    width:200px;
    height:50px;
    font-size:20px;
}


</style>
    </head>
    <body>
        <div class="navbar">
            <div class="logo-container">
                <img src="logo.png" class="logo" alt="SKML logo">
            <h1>SKML FAMILY DHABA</h1>
           </div>
         <button class="btn" onclick="window.location.href='offer.html';">Offer of the day</buttononclick>
        </div>
        <div class="banner"></div>
        <h1 style="text-align: center;font-family:Lucida Handwriting; font-size:60px;">Welcome to SKML FAMILY DHABA</h1><br><br>
        <h2 style="text-align: center;">What was your preference..!?</h2><br><br>

       <div class="cards">
    <div class="card" onclick="window.location.href='veg.html';">
        <div class="circle">
            <img src="v.jpg">
        </div>
        <h3>Vegetarian</h3>
    </div>

    <div class="card" onclick="window.location.href='NV.html';">
        <div class="circle">
            <img src="nv.jpg">
        </div>
        <h3>Non-Vegetarian</h3>
    </div>
    </div>
    </body>
</html>
